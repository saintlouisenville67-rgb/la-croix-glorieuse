<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#9B1C1C">
  <title>Prière - La Croix Glorieuse</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/tailwind.min.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="js/app.js"></script>
  <script src="js/config.js"></script>
  
</head>
<body>
<header class="gradient-header" style="padding:20px 20px 32px">
  <div style="max-width:440px;margin:0 auto;display:flex;align-items:center;gap:12px">
    <img src="logo.png" alt="" style="width:32px;height:32px;border-radius:50%;object-fit:cover;border:1.5px solid rgba(255,255,255,0.3);flex-shrink:0">
    <div>
      <h1 style="font-size:20px;font-weight:900;color:#fff;margin:0;line-height:1.1">Prière</h1>
      <p style="font-size:9px;font-weight:800;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:0.12em;margin:2px 0 0">Communion des Saints</p>
    </div>
  </div>
</header>

<main style="max-width:440px;margin:0 auto;padding:16px 16px 96px">

  <!-- Formulaire intention -->
  <div class="card" style="margin-bottom:16px">
    <h2 style="font-size:11px;font-weight:900;color:var(--crimson);text-transform:uppercase;letter-spacing:0.1em;margin:0 0 14px">Confier une intention</h2>
    <div style="display:flex;flex-direction:column;gap:10px">
      <input type="text" id="prenom" placeholder="Votre prénom (optionnel)"
             style="background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:11px 14px;font-size:13px;font-weight:600;font-family:inherit;color:var(--text-1);outline:none;width:100%">
      <textarea id="intention" placeholder="Votre intention de prière…"
                style="background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:11px 14px;font-size:13px;font-family:inherit;color:var(--text-1);outline:none;width:100%;min-height:90px;resize:vertical"></textarea>
      <p style="font-size:10px;color:var(--text-3);font-style:italic;text-align:center;margin:0">Votre intention sera visible après validation par un abbé.</p>
      <button onclick="envoyerPriere()" id="btn-priere"
              style="width:100%;background:var(--gradient);color:#fff;border:none;border-radius:13px;padding:14px;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:0.1em;cursor:pointer;font-family:inherit">
        Envoyer mon intention
      </button>
      <div id="msg-feedback" class="hidden" style="border-radius:12px;padding:12px 14px;text-align:center;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.06em;border:1px solid"></div>
    </div>
  </div>

  <!-- Offrande messe -->
  <div class="card" style="margin-bottom:16px">
    <button onclick="toggleMesse()" style="width:100%;display:flex;align-items:center;gap:14px;background:none;border:none;cursor:pointer;text-align:left;padding:0;font-family:inherit">
      <div style="width:40px;height:40px;border-radius:12px;background:var(--crimson-light);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">🕊️</div>
      <div style="flex:1">
        <p style="font-size:9px;font-weight:900;color:var(--crimson);text-transform:uppercase;letter-spacing:0.1em;margin:0 0 2px">Offrande</p>
        <p style="font-size:13px;font-weight:700;color:var(--text-1);margin:0">Demander une Messe</p>
      </div>
      <svg id="chevron-messe" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="2.5" style="flex-shrink:0;transition:transform 0.3s"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <div id="container-messe" class="hidden" style="margin-top:14px;border-top:1px solid var(--border);padding-top:14px">
      <iframe src="demande-messe.html" id="iframe-messe" style="width:100%;border:none;border-radius:12px;height:680px;display:block"></iframe>
    </div>
  </div>

  <!-- Intentions communauté -->
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
    <div style="height:1px;flex:1;background:var(--border)"></div>
    <span style="font-size:9px;font-weight:800;color:var(--text-3);text-transform:uppercase;letter-spacing:0.12em;white-space:nowrap">Intentions de la communauté</span>
    <div style="height:1px;flex:1;background:var(--border)"></div>
  </div>

  <div id="feed-priere" style="display:flex;flex-direction:column;gap:10px">
    <div class="skeleton" style="height:90px"></div>
    <div class="skeleton" style="height:90px"></div>
  </div>

</main>

<!-- FAB mes prières -->
<div id="fab-overlay" onclick="togglePrayerFab()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);backdrop-filter:blur(4px);z-index:50;opacity:0;transition:opacity 0.25s"></div>

<button id="main-fab" onclick="togglePrayerFab()"
        style="position:fixed;bottom:84px;left:20px;width:50px;height:50px;border-radius:50%;background:#0F172A;border:2px solid rgba(255,255,255,0.1);color:#fff;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,0.35);z-index:60;display:flex;align-items:center;justify-content:center">
  <span id="fab-icon"><i data-lucide="sparkles" style="width:20px;height:20px"></i></span>
</button>

<!-- Options prières -->
<div class="prayer-opt" onclick="goToPrayer('matin')"    style="bottom:244px"><div class="opt-icon"><i data-lucide="sun"    style="width:18px;height:18px;color:#F59E0B"></i></div><span class="opt-label">Prière du Matin</span></div>
<div class="prayer-opt" onclick="goToPrayer('soir')"     style="bottom:194px"><div class="opt-icon"><i data-lucide="moon"   style="width:18px;height:18px;color:#6366F1"></i></div><span class="opt-label">Prière du Soir</span></div>
<div class="prayer-opt" onclick="goToPrayer('usuelles')" style="bottom:144px"><div class="opt-icon"><i data-lucide="cross"  style="width:18px;height:18px;color:#9B1C1C"></i></div><span class="opt-label">Prières usuelles</span></div>
<div class="prayer-opt" onclick="goToPrayer('chapelet')" style="bottom:94px" ><div class="opt-icon"><i data-lucide="disc"   style="width:18px;height:18px;color:#B45309"></i></div><span class="opt-label">Chapelet</span></div>

<style>
.prayer-opt{position:fixed;left:20px;display:flex;align-items:center;gap:10px;z-index:55;cursor:pointer;opacity:0;transform:translateX(-16px) scale(0.9);transition:all 0.3s cubic-bezier(0.175,0.885,0.32,1.275);pointer-events:none}
.prayer-opt.show{opacity:1;transform:translateX(0) scale(1);pointer-events:auto}
.opt-icon{width:42px;height:42px;background:var(--surface);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,0.15);border:1px solid var(--border);flex-shrink:0}
.opt-label{background:#0F172A;color:#fff;padding:6px 12px;border-radius:10px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.05em;white-space:nowrap;box-shadow:0 3px 10px rgba(0,0,0,0.15)}
</style>

<nav class="bottom-nav"></nav>

<script>
lucide.createIcons();
let isFabOpen=false;

function togglePrayerFab() {
  isFabOpen=!isFabOpen;
  const overlay=document.getElementById('fab-overlay');
  const fab=document.getElementById('main-fab');
  if (isFabOpen) {
    overlay.style.display='block'; requestAnimationFrame(()=>overlay.style.opacity='1');
    document.getElementById('fab-icon').innerHTML='<i data-lucide="x" style="width:20px;height:20px"></i>';
    fab.style.background='#9B1C1C';
  } else {
    overlay.style.opacity='0'; setTimeout(()=>overlay.style.display='none',250);
    document.getElementById('fab-icon').innerHTML='<i data-lucide="sparkles" style="width:20px;height:20px"></i>';
    fab.style.background='#0F172A';
  }
  lucide.createIcons();
  document.querySelectorAll('.prayer-opt').forEach(el=>el.classList.toggle('show',isFabOpen));
}

function goToPrayer(type) { togglePrayerFab(); setTimeout(()=>window.location.href=`mesprieres.html?type=${type}`,280); }

function toggleMesse() {
  const c=document.getElementById('container-messe');
  const cv=document.getElementById('chevron-messe');
  const hidden=c.classList.contains('hidden');
  c.classList.toggle('hidden',!hidden);
  cv.style.transform=hidden?'rotate(180deg)':'rotate(0deg)';
  if (hidden) setTimeout(()=>c.scrollIntoView({behavior:'smooth',block:'start'}),100);
}

async function loadPrières() {
  const { data, error } = await sbFetch(()=>sb.from('intentions').select('*').eq('valide',true).order('created_at',{ascending:false}));
  const feed=document.getElementById('feed-priere');
  if (error&&!data) { feed.innerHTML='<p style="text-align:center;padding:30px;color:var(--text-3);font-size:13px">📡 Connexion indisponible</p>'; return; }
  if (!data?.length) { feed.innerHTML='<p style="text-align:center;padding:30px;color:var(--text-3);font-size:13px;font-style:italic">Aucune intention pour le moment.</p>'; return; }
  feed.innerHTML = data.map(p=>{
    const count=p.bougies||0;
    return `<div class="card animate-fade-in" style="padding:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:9px;font-weight:900;color:var(--crimson);text-transform:uppercase;letter-spacing:0.08em">${esc(p.prenom||'Anonyme')}</span>
        <span style="font-size:10px;color:var(--text-3)">${new Date(p.created_at).toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</span>
      </div>
      <p style="font-size:13px;color:var(--text-2);font-style:italic;line-height:1.55;margin:0 0 12px">"${esc(p.texte)}"</p>
      <button onclick="allumerBougie('${p.id}')" style="display:inline-flex;align-items:center;gap:6px;background:var(--gold-light);border:1px solid #FDE68A;border-radius:20px;padding:6px 12px;font-size:11px;font-weight:700;color:${count>0?'#92400E':'var(--text-2)'};cursor:pointer;font-family:inherit">
        🕯️ <span>${count>0?count+' '+(count>1?'ont prié':'a prié'):'Prier avec'}</span>
      </button>
    </div>`;
  }).join('');
}

async function envoyerPriere() {
  const prenom=document.getElementById('prenom').value;
  const texte=document.getElementById('intention').value.trim();
  const btn=document.getElementById('btn-priere');
  if (!texte) { afficherFeedback('Écrivez votre intention.','error'); return; }
  const last=parseInt(localStorage.getItem('last_intention_sent')||'0');
  if (Date.now()-last<30000) { const r=Math.ceil((30000-(Date.now()-last))/1000); afficherFeedback(`Patientez ${r}s.`,'error'); return; }
  btn.disabled=true; btn.innerText='Envoi…';
  const { error } = await sb.from('intentions').insert([{prenom:prenom||'Anonyme',texte}]);
  btn.disabled=false; btn.innerText='Envoyer mon intention';
  if (!error) {
    localStorage.setItem('last_intention_sent',Date.now().toString());
    document.getElementById('prenom').value=''; document.getElementById('intention').value='';
    afficherFeedback('Intention transmise aux abbés.','success'); loadPrières();
  } else { afficherFeedback("Échec de l'envoi. Réessayez.",'error'); }
}

function afficherFeedback(msg,type) {
  const el=document.getElementById('msg-feedback');
  el.innerText=msg; el.classList.remove('hidden');
  el.style.background=type==='success'?'#F0FDF4':'#FEF2F2';
  el.style.color=type==='success'?'#15803D':'#DC2626';
  el.style.borderColor=type==='success'?'#BBF7D0':'#FECACA';
  setTimeout(()=>el.classList.add('hidden'),5000);
}

const _bougiesEnCours=new Set();
async function allumerBougie(id) {
  if (_bougiesEnCours.has(id)) return;
  _bougiesEnCours.add(id); hapticFeedback(20);
  const { error } = await sbFetch(()=>sb.rpc('increment_bougie',{row_id:id}));
  _bougiesEnCours.delete(id);
  if (!error) loadPrières();
}

loadPrières();
sb.channel('intentions-ch').on('postgres_changes',{event:'*',schema:'public',table:'intentions'},()=>loadPrières()).subscribe();
</script>
<script src="js/menu.js"></script>
</body>
</html>
