<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#9B1C1C">
  <title>Agenda - La Croix Glorieuse</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/tailwind.min.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <script src="js/app.js"></script>
  <style>
    .month-pill{padding:7px 14px;border-radius:20px;font-size:10px;font-weight:800;text-transform:uppercase;border:1px solid var(--border);background:var(--surface);color:var(--text-3);cursor:pointer;white-space:nowrap;font-family:inherit;transition:all 0.15s ease}
    .month-pill.active{background:var(--crimson);color:#fff;border-color:transparent}
    .loader{width:18px;height:18px;border:2.5px solid var(--border);border-top-color:var(--crimson);border-radius:50%;animation:spin 0.8s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}
    ::-webkit-scrollbar{display:none}
  </style>
</head>
<body>

<header class="gradient-header" style="padding:20px 20px 32px">
  <div style="max-width:440px;margin:0 auto;display:flex;align-items:center;gap:12px">
    <img src="logo.png" alt="" style="width:32px;height:32px;border-radius:50%;object-fit:cover;border:1.5px solid rgba(255,255,255,0.3);flex-shrink:0">
    <div>
      <h1 style="font-size:20px;font-weight:900;color:#fff;margin:0;line-height:1.1">Agenda</h1>
      <p style="font-size:9px;font-weight:800;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:0.12em;margin:2px 0 0">Paroisse La Croix Glorieuse</p>
    </div>
  </div>
</header>

<main style="max-width:440px;margin:0 auto;padding:16px 16px 96px">

  <!-- Recherche -->
  <div class="card" style="margin-bottom:16px">
    <input type="text" id="searchInput" onkeyup="filterEvents()" placeholder="Messe, Adoration, Confession…"
           style="width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;font-size:13px;font-weight:600;font-family:inherit;color:var(--text-1);outline:none;margin-bottom:12px">
    <div id="month-filters" style="display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;-ms-overflow-style:none;scrollbar-width:none"></div>
  </div>

  <div id="agenda-container" style="display:flex;flex-direction:column;gap:20px">
    <div style="text-align:center;padding:32px"><div class="loader"></div></div>
  </div>
</main>

<nav class="bottom-nav"></nav>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script>
const API_KEY='AIzaSyAI5N6lamviexKaPR-WoOP4006m5IClDoQ', CALENDAR_ID='saintlouisenville67@gmail.com';
let allEvents=[], selectedMonth=null;

function setupMonthFilters() {
  const c=document.getElementById('month-filters');
  const months=['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Août','Sep','Oct','Nov','Déc'];
  const cur=new Date().getMonth();
  let html=`<button onclick="filterByMonth(null)" id="btn-all" class="month-pill active">Tous</button>`;
  for (let i=0;i<12;i++) {
    const idx=(cur+i)%12;
    html+=`<button onclick="filterByMonth(${idx})" id="btn-${idx}" class="month-pill">${months[idx]}</button>`;
  }
  c.innerHTML=html;
}

async function fetchCalendar() {
  const cached=localStorage.getItem('paroiss_agenda_cache');
  if (cached) { allEvents=JSON.parse(cached); displayAgenda(allEvents); }
  const now=new Date(), max=new Date(); max.setDate(now.getDate()+365);
  const url=`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events?key=${API_KEY}&timeMin=${now.toISOString()}&timeMax=${max.toISOString()}&singleEvents=true&orderBy=startTime&maxResults=1000`;
  try {
    const r=await fetch(url), d=await r.json();
    if (d.items) { allEvents=d.items; localStorage.setItem('paroiss_agenda_cache',JSON.stringify(allEvents)); displayAgenda(allEvents); }
  } catch(e) { if (!cached) document.getElementById('agenda-container').innerHTML='<p style="text-align:center;padding:40px;color:var(--text-3);font-size:13px">📡 Connexion indisponible</p>'; }
}

function displayAgenda(events) {
  const c=document.getElementById('agenda-container');
  const q=(document.getElementById('searchInput')?.value||'').toLowerCase();
  const now=new Date();
  const filtered=events.filter(e=>{
    const d=new Date(e.start.dateTime||e.start.date);
    return (selectedMonth===null||d.getMonth()===selectedMonth)&&(e.summary||'').toLowerCase().includes(q);
  });
  const items=selectedMonth===null&&q===''?filtered.slice(0,50):filtered;
  if (!items.length) { c.innerHTML='<p style="text-align:center;padding:40px;color:var(--text-3);font-size:13px;font-style:italic">Aucun événement.</p>'; return; }
  const groups=items.reduce((acc,e)=>{
    const d=new Date(e.start.dateTime||e.start.date).toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
    if (!acc[d]) acc[d]=[];
    acc[d].push(e);
    return acc;
  },{});
  c.innerHTML = Object.entries(groups).map(([date,evs])=>`
    <div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div style="height:1px;flex:1;background:var(--border)"></div>
        <span style="font-size:9px;font-weight:800;color:var(--text-3);text-transform:uppercase;letter-spacing:0.1em;white-space:nowrap">${date}</span>
        <div style="height:1px;flex:1;background:var(--border)"></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${evs.map(e=>{
          const start=new Date(e.start.dateTime||e.start.date);
          const isLive=e.start.dateTime&&start<=now&&new Date(e.end.dateTime)>=now;
          const time=e.start.dateTime?start.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}):'Journée';
          return `<div class="card animate-fade-in" style="padding:14px 16px${isLive?';border:1px solid #BBF7D0;background:#F0FDF4':''}" >
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
              <span style="font-size:9px;font-weight:900;color:${isLive?'#15803D':'var(--crimson)'};text-transform:uppercase;letter-spacing:0.08em${isLive?';animation:softPulse 2s infinite':''}">${isLive?'● En direct':time}</span>
              <button onclick="addToCalendar('${(e.summary||'').replace(/'/g,"\'")}','${e.start.dateTime||e.start.date}')" style="font-size:9px;font-weight:800;color:var(--text-3);background:var(--surface-2);border:1px solid var(--border);border-radius:6px;padding:3px 8px;cursor:pointer;font-family:inherit">+ Ajouter</button>
            </div>
            <p style="font-size:13px;font-weight:700;color:${isLive?'#15803D':'var(--text-1)'};margin:0;line-height:1.3">${esc(e.summary||'Sans titre')}</p>
          </div>`;
        }).join('')}
      </div>
    </div>`).join('');
}

function filterByMonth(m) {
  selectedMonth=m;
  document.querySelectorAll('.month-pill').forEach(b=>b.classList.remove('active'));
  (m===null?document.getElementById('btn-all'):document.getElementById(`btn-${m}`)).classList.add('active');
  displayAgenda(allEvents);
  window.scrollTo({top:0,behavior:'smooth'});
}

function filterEvents() { displayAgenda(allEvents); }
function addToCalendar(t,s) {
  const d=new Date(s).toISOString().replace(/[-:.]\d+/g,'');
  window.open(`https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(t)}&dates=${d}/${d}`,'_blank');
}

setupMonthFilters();
fetchCalendar();
</script>
<script src="js/menu.js"></script>
</body>
</html>
