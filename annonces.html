<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#9B1C1C">
  <title>Annonces - La Croix Glorieuse</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/tailwind.min.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/app.js"></script>
  <script src="js/config.js"></script>
  
</head>
<body>
<header class="gradient-header" style="padding:20px 20px 32px">
  <div style="max-width:440px;margin:0 auto">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:2px">
      <img src="logo.png" alt="" style="width:32px;height:32px;border-radius:50%;object-fit:cover;border:1.5px solid rgba(255,255,255,0.3);flex-shrink:0">
      <div>
        <h1 style="font-size:20px;font-weight:900;color:#fff;margin:0;letter-spacing:-0.3px;line-height:1.1">Annonces</h1>
        <p style="font-size:9px;font-weight:800;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:0.12em;margin:2px 0 0">Vie de la communauté</p>
      </div>

    </div>
  </div>
</header>
<main style="max-width:440px;margin:0 auto;padding:16px 16px 96px">
  <div id="feed-annonces-complet" style="display:flex;flex-direction:column;gap:12px">
    <div class="skeleton" style="height:96px"></div>
    <div class="skeleton" style="height:96px"></div>
    <div class="skeleton" style="height:96px"></div>
  </div>
</main>
<nav class="bottom-nav"></nav>
<script>
async function loadAllAnnonces() {
  const feed = document.getElementById('feed-annonces-complet');
  const { data, error } = await sbFetch(() => sb.from('annonces').select('*').order('est_importante',{ascending:false}).order('created_at',{ascending:false}), { cacheKey:'annonces' });
  if (error && !data) {
    feed.innerHTML = `<div style="text-align:center;padding:40px 20px"><p style="font-size:24px;margin:0 0 8px">📡</p><p style="font-size:13px;font-weight:700;color:var(--text-2)">Connexion indisponible</p><button onclick="location.reload()" style="margin-top:12px;font-size:10px;font-weight:800;color:var(--crimson);text-transform:uppercase;background:none;border:none;cursor:pointer;letter-spacing:0.08em">Réessayer</button></div>`;
    return;
  }
  if (!data?.length) {
    feed.innerHTML = `<div style="text-align:center;padding:40px 20px"><p style="font-size:13px;color:var(--text-3);font-style:italic">Aucune annonce pour le moment.</p></div>`;
    return;
  }
  if (data[0]) localStorage.setItem('last_annonce_date', data[0].created_at);
  feed.innerHTML = data.map(a => {
    const important = a.est_importante;
    return `<div class="card animate-fade-in" style="${important ? 'border-left:3px solid #B91C1C;' : ''}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px">
        ${important ? `<span style="font-size:8px;font-weight:900;color:#9B1C1C;text-transform:uppercase;letter-spacing:0.1em;background:#FEE2E2;padding:3px 8px;border-radius:6px;flex-shrink:0">★ En avant</span>` : ''}
        <h3 style="font-size:13px;font-weight:800;color:${important?'#7F1D1D':'var(--text-1)'};margin:0;line-height:1.3;flex:1">${esc(a.titre)}</h3>
        <span style="font-size:10px;color:var(--text-3);white-space:nowrap;flex-shrink:0">${new Date(a.created_at).toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</span>
      </div>
      <p style="font-size:12px;color:var(--text-2);line-height:1.6;margin:0${a.lien_url?' 0 12px':''}">${esc(a.contenu)}</p>
      ${a.lien_url ? `<a href="${esc(a.lien_url)}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;background:var(--text-1);color:#fff;padding:8px 14px;border-radius:10px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;text-decoration:none">En savoir plus <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a>` : ''}
    </div>`;
  }).join('');
}
loadAllAnnonces();
</script>
<script src="js/menu.js"></script>
</body>
</html>
