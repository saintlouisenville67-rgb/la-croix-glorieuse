<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#9B1C1C">
  <title>Groupes - La Croix Glorieuse</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/tailwind.min.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/app.js"></script>
  <script src="js/config.js"></script>
  
</head>
<body>
<header class="gradient-header" style="padding:20px 20px 32px">
  <div style="max-width:440px;margin:0 auto">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:2px">
      <img src="logo.png" alt="" style="width:32px;height:32px;border-radius:50%;object-fit:cover;border:1.5px solid rgba(255,255,255,0.3);flex-shrink:0">
      <div>
        <h1 style="font-size:20px;font-weight:900;color:#fff;margin:0;letter-spacing:-0.3px;line-height:1.1">Groupes</h1>
        <p style="font-size:9px;font-weight:800;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:0.12em;margin:2px 0 0">Vie de la paroisse</p>
      </div>

    </div>
  </div>
</header>
<main style="max-width:440px;margin:0 auto;padding:16px 16px 96px">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:14px;margin-bottom:16px">
    <input type="text" id="groupSearch" onkeyup="filterGroupes()" placeholder="Rechercher un groupe..."
           style="width:100%;background:var(--surface-2);border:none;border-radius:12px;padding:12px 14px;font-size:13px;font-weight:600;font-family:inherit;color:var(--text-1);outline:none">
  </div>
  <a href="https://www.croix-glorieuse.org/" target="_blank"
     style="display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:14px 18px;margin-bottom:16px;text-decoration:none">
    <span style="font-size:11px;font-weight:800;color:var(--text-1);text-transform:uppercase;letter-spacing:0.06em">Toutes les activités de la paroisse</span>
    <span style="color:var(--text-3);font-size:16px;font-weight:300">→</span>
  </a>
  <div id="groupes-list" style="display:flex;flex-direction:column;gap:12px">
    <div class="skeleton" style="height:110px"></div>
    <div class="skeleton" style="height:110px"></div>
  </div>
</main>
<nav class="bottom-nav"></nav>
<script>
let allGroupes = [];
async function loadGroupes() {
  const { data, error } = await sbFetch(() => sb.from('groupes').select('*').order('nom'), { cacheKey:'groupes' });
  if (data) { allGroupes = data; displayGroupes(data); }
}
function displayGroupes(groupes) {
  const list = document.getElementById('groupes-list');
  if (!groupes.length) { list.innerHTML = `<p style="text-align:center;color:var(--text-3);font-style:italic;padding:20px">Aucun groupe trouvé.</p>`; return; }
  list.innerHTML = groupes.map(g => `
    <div class="card animate-fade-in">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px">
        <h3 style="font-size:14px;font-weight:800;color:var(--text-1);margin:0;line-height:1.2">${esc(g.nom)}</h3>
        <span style="font-size:8px;font-weight:900;color:#15803D;background:#DCFCE7;padding:3px 8px;border-radius:6px;white-space:nowrap;flex-shrink:0">WhatsApp</span>
      </div>
      <p style="font-size:12px;color:var(--text-2);line-height:1.55;margin:0 0 14px">${esc(g.description || 'Rejoignez notre communauté pour échanger et rester informé des activités du groupe.')}</p>
      <a href="${esc(g.lien_wa||'#')}" target="_blank" rel="noopener"
         style="display:block;width:100%;background:var(--gradient);color:#fff;text-align:center;padding:11px;border-radius:12px;font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:0.1em;text-decoration:none">Rejoindre →</a>
    </div>`).join('');
}
function filterGroupes() {
  const q = document.getElementById('groupSearch').value.toLowerCase();
  displayGroupes(allGroupes.filter(g => g.nom.toLowerCase().includes(q) || (g.description||'').toLowerCase().includes(q)));
}
loadGroupes();
</script>
<script src="js/menu.js"></script>
</body>
</html>
